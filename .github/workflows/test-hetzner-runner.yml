name: Test Hetzner self-hosted runner

# Validates the new SRE-managed Hetzner runner pool (fsn1-runner-01, 8 instances).
# Triggered manually OR on push to test/hetzner-runner. Does NOT run on main —
# this is purely a smoke test, not part of the CI matrix.

on:
  workflow_dispatch:
  push:
    branches:
      - test/hetzner-runner

jobs:
  smoke:
    name: Smoke test on Hetzner runner (${{ matrix.tier }})
    strategy:
      fail-fast: false
      matrix:
        tier: [tier:small, tier:medium, tier:large]
    runs-on: [self-hosted, "${{ matrix.tier }}"]
    timeout-minutes: 5
    steps:
      - name: Identify runner
        run: |
          echo "=== Runner identity ==="
          hostname
          whoami
          uname -a
          echo
          echo "=== Hardware ==="
          nproc
          free -h
          df -h /
          echo
          echo "=== Docker available? ==="
          docker version 2>&1 | head -10 || echo "  (docker not present or not in PATH)"
          echo
          echo "=== Cache services on host ==="
          for port in 4226 8088 8372; do
            nc -z localhost $port 2>/dev/null && echo "  localhost:$port  reachable" || echo "  localhost:$port  not reachable"
          done
          echo
          echo "=== Cache env vars (set by runner /opt/actions-runner/N/.env) ==="
          env | grep -E '^(SCCACHE|EARTHLY|ACTIONS_CACHE|BUILDX|DOCKER_BUILDKIT|RUSTC_WRAPPER)' | sort

      - name: Checkout (verify the runner can clone)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Show repo presence
        run: |
          ls -la
          git log --oneline -1
