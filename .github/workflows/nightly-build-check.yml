name: Nightly Build Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build_node:
    name: Build Node against latest
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_COLOR: 1
    outputs:
      node_result: ${{ steps.run_earthly.outputs.node_result }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - uses: EarthBuild/actions-setup@18dfcfe4187dfa60677115966921217d8619be9b
        with:
          version: v0.8.17-rc-3
          prerelease: true
          github-token: ${{ github.token }}
          use-cache: false

      - name: Cat the Cargo.toml
        run: cat ./Cargo.toml

      - name: Free disk space
        run: scripts/free-disk-space.sh

      - name: Run check
        run: |
          mkdir -p "$HOME"/.cargo
          echo "[net]" >> "$HOME"/.cargo/config
          echo "git-fetch-with-cli = true" >> "$HOME"/.cargo/config

          . ./.envrc && earthly -P --ci --platform=linux/amd64 +node-image
