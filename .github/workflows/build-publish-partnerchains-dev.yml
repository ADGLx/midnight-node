name: +partnerchains-dev (Build Docker image that contains Partner Chains tools)

on:
  workflow_dispatch:
  schedule:
    # Once a week
    - cron: "0 0 * * 0"
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true
jobs:
  run:
    name: Build an image with Partner Chains tools
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
    steps:
      - uses: EarthBuild/actions-setup@18dfcfe4187dfa60677115966921217d8619be9b
        with:
          version: v0.8.17-rc-3
          prerelease: true
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  #v3.7.0

        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Run build
        run: |
          mkdir -p "$HOME"/.cargo
          echo "[net]" >> "$HOME"/.cargo/config
          echo "git-fetch-with-cli = true" >> "$HOME"/.cargo/config

          . ./.envrc && earth --ci --push +partnerchains-dev
