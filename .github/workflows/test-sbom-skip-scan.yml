name: "Test: SBOM skip-scan"

on:
  push:
    branches:
      - 'SRE-1910/**'

permissions: {}

jobs:
  # Resolve a known image tag from the latest main build
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image-tag: ${{ steps.tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          ref: main
          fetch-depth: 1
      - name: Derive image tag from main
        id: tag
        run: |
          VERSION=$(grep '^version =' node/Cargo.toml | head -1 | awk '{print $3}' | tr -d '"')
          SHORT_SHA=$(git rev-parse --short=8 HEAD)
          echo "IMAGE_TAG=${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  # Job 1: Full scan + attest (should install Grype, run scan, generate SBOM)
  with-scan:
    name: "With scan (expect Grype steps)"
    needs: [prepare]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node:${{ needs.prepare.outputs.image-tag }}-amd64
      sbom-artifact-name: test-sbom-with-scan
      skip-attestation: true
    secrets: inherit

  # Job 2: Skip scan (should skip Grype install + scan, still generate SBOM)
  without-scan:
    name: "Without scan (expect Grype skipped)"
    needs: [prepare]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/sbom-scan-image.yml
    with:
      image: ghcr.io/midnight-ntwrk/midnight-node:${{ needs.prepare.outputs.image-tag }}-amd64
      sbom-artifact-name: test-sbom-without-scan
      skip-scan: true
      skip-attestation: true
    secrets: inherit
