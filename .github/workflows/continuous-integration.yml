name: CI + E2E

env:
  # Define environment variables for AWS credentials and region
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_EKS_CLUSTER_NAME: ${{ secrets.AWS_EKS_CLUSTER_NAME }}
  IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true }}

on:
  merge_group:
  pull_request:
    branches: [ "**" ]
    paths-ignore:
      - "changes/**"
  workflow_dispatch:
permissions:
  id-token: write
  contents: write
  packages: write

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.head_ref) || github.run_id }}
  cancel-in-progress: true
jobs:
  run:
    name: Build node and images (linux/amd64, ubuntu-latest-16-core-x64, amd64)
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest-16-core-x64
    env:
      FORCE_COLOR: 1
    outputs:
      sha: ${{ steps.get_sha.outputs.sha }}
      node_image: ${{ steps.image_tags.outputs.node_image }}
      toolkit_image: ${{ steps.image_tags.outputs.toolkit_image }}
      version: ${{ steps.image_tags.outputs.version }}
      short_hash: ${{ steps.image_tags.outputs.short_hash }}
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Get current commit SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        if: env.IS_FORK != 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Run build
        run: |
          mkdir -p $HOME/.cargo
          echo "[net]" >> $HOME/.cargo/config
          echo "git-fetch-with-cli = true" >> $HOME/.cargo/config

          PUSH_FLAG=""
          if [ "$IS_FORK" != "true" ]; then
            PUSH_FLAG="--push"
          fi
          . ./.envrc && earthly --secret GITHUB_TOKEN=${{ secrets.MIDNIGHTCI_PACKAGES_READ }} -P --strict $PUSH_FLAG +images

      - name: Get image tags
        id: image_tags
        run: |
          short_hash=$(git rev-parse --short=8 HEAD)
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "short_hash=$short_hash" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "node_image=ghcr.io/midnight-ntwrk/midnight-node:${version}-${short_hash}-amd64" >> $GITHUB_OUTPUT
          echo "toolkit_image=ghcr.io/midnight-ntwrk/midnight-node-toolkit:${version}-${short_hash}-amd64" >> $GITHUB_OUTPUT

      - name: Save Docker images
        run: |
          docker save "${{ steps.image_tags.outputs.node_image }}" | zstd -T0 -3 > /tmp/node-image.tar.zst
          docker save "${{ steps.image_tags.outputs.toolkit_image }}" | zstd -T0 -3 > /tmp/toolkit-image.tar.zst

      - name: Upload node image
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: docker-image-node
          path: /tmp/node-image.tar.zst
          retention-days: 1
          compression-level: 0

      - name: Upload toolkit image
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: docker-image-toolkit
          path: /tmp/toolkit-image.tar.zst
          retention-days: 1
          compression-level: 0

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: success() || failure()
        with:
          name: Wasm Runtime and binaries (amd64)
          path: artifacts-amd64/

      - name: Upload test artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: success() || failure()
        with:
          name: Test artifacts (amd64)
          path: test-artifacts-amd64/

  run-arm64:
    name: Build node and images (arm64)
    # ARM64 gating: only for merge_group, workflow_dispatch, or PRs with ci:arm64 label
    if: |
      github.event_name == 'merge_group' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci:arm64'))
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest-8-core-arm64
    env:
      FORCE_COLOR: 1
    steps:
      # QEMU required on ARM64 runner for compactc (amd64-only binary)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          image: tonistiigi/binfmt@sha256:1b804311fe87047a4c96d38b4b3ef6f62fca8cd125265917a9e3dc3c996c39e6 # latest
          platforms: "amd64"

      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Login to GHCR
        if: env.IS_FORK != 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Run build
        run: |
          mkdir -p $HOME/.cargo
          echo "[net]" >> $HOME/.cargo/config
          echo "git-fetch-with-cli = true" >> $HOME/.cargo/config

          PUSH_FLAG=""
          if [ "$IS_FORK" != "true" ]; then
            PUSH_FLAG="--push"
          fi
          . ./.envrc && earthly --secret GITHUB_TOKEN=${{ secrets.MIDNIGHTCI_PACKAGES_READ }} -P --strict $PUSH_FLAG +images

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: success() || failure()
        with:
          name: Wasm Runtime and binaries (arm64)
          path: artifacts-arm64/

      - name: Upload test artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: success() || failure()
        with:
          name: Test artifacts (arm64)
          path: test-artifacts-arm64/

  hardfork:
    name: Build hardfork images
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
    outputs:
      sha: ${{ steps.get_sha.outputs.sha }}
      upgrader_image: ${{ steps.image_tags.outputs.upgrader_image }}
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Get current commit SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        if: env.IS_FORK != 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ghcr.io
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Free disk space
        run: scripts/free-disk-space.sh

      - name: Run build
        run: |
          mkdir -p "$HOME/.cargo"
          echo "[net]" >> "$HOME/.cargo/config"
          echo "git-fetch-with-cli = true" >> "$HOME/.cargo/config"

          PUSH_FLAG=""
          if [ "$IS_FORK" != "true" ]; then
            PUSH_FLAG="--push"
          fi
          . ./.envrc && earthly --secret GITHUB_TOKEN="${{ secrets.MIDNIGHTCI_PACKAGES_READ }}" -P --strict $PUSH_FLAG +hardfork-test-upgrader-image

      - name: Get image tags
        id: image_tags
        run: |
          short_hash=$(git rev-parse --short=8 HEAD)
          version=$(grep -m 1 '^version =' node/Cargo.toml | cut -d '"' -f2)
          echo "short_hash=$short_hash" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "upgrader_image=ghcr.io/midnight-ntwrk/midnight-hardfork-test-upgrader:${version}-${short_hash}-" >> $GITHUB_OUTPUT

      - name: Save upgrader image
        run: |
          docker save "${{ steps.image_tags.outputs.upgrader_image }}" | zstd -T0 -3 > /tmp/upgrader-image.tar.zst

      - name: Upload upgrader image
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: docker-image-upgrader
          path: /tmp/upgrader-image.tar.zst
          retention-days: 1
          compression-level: 0

  check-unused-deps:
    name: Check Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Check Deps
        run: |
          mkdir -p $HOME/.cargo
          echo "[net]" >> $HOME/.cargo/config
          echo "git-fetch-with-cli = true" >> $HOME/.cargo/config

          . ./.envrc && earthly +check-deps

  rebuild-genesis:
    name: Check Genesis Rebuild
    needs: [run]
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
    outputs:
      sha: ${{ steps.get_sha.outputs.sha }}
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Get current commit SHA
        id: get_sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Download node image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-node
          path: /tmp/images

      - name: Download toolkit image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-toolkit
          path: /tmp/images

      - name: Start local registry and load images
        run: |
          mkdir -p ~/.earthly
          cat > ~/.earthly/config.yml <<'EOFCFG'
          global:
            buildkit_additional_args: ["--network", "host"]
            buildkit_additional_config: |
              [registry."127.0.0.1:5000"]
                http = true
                insecure = true
          EOFCFG

          docker run -d --network host --name registry registry:2

          for f in /tmp/images/*.tar.zst; do
            zstd -d "$f" --stdout | docker load
          done

          TAG="${{ needs.run.outputs.version }}-${{ needs.run.outputs.short_hash }}-amd64"
          docker tag "ghcr.io/midnight-ntwrk/midnight-node:${TAG}" "127.0.0.1:5000/midnight-ntwrk/midnight-node:${TAG}"
          docker push "127.0.0.1:5000/midnight-ntwrk/midnight-node:${TAG}"
          docker tag "ghcr.io/midnight-ntwrk/midnight-node-toolkit:${TAG}" "127.0.0.1:5000/midnight-ntwrk/midnight-node-toolkit:${TAG}"
          docker push "127.0.0.1:5000/midnight-ntwrk/midnight-node-toolkit:${TAG}"
          rm -rf /tmp/images

      - name: Check Genesis Rebuild
        run: |
          mkdir -p $HOME/.cargo
          echo "[net]" >> $HOME/.cargo/config
          echo "git-fetch-with-cli = true" >> $HOME/.cargo/config

          TAG="${{ needs.run.outputs.version }}-${{ needs.run.outputs.short_hash }}-amd64"
          . ./.envrc && earthly --build-arg NODE_IMAGE=127.0.0.1:5000/midnight-ntwrk/midnight-node:${TAG} --build-arg TOOLKIT_IMAGE=127.0.0.1:5000/midnight-ntwrk/midnight-node-toolkit:${TAG} --secret GITHUB_TOKEN +rebuild-genesis
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_READ }}

  hardfork-e2e:
    name: Hardfork E2E
    needs:
      - run
      - hardfork
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Download node image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-node
          path: /tmp/images
      - name: Download upgrader image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-upgrader
          path: /tmp/images
      - name: Load Docker images
        run: |
          for f in /tmp/images/*.tar.zst; do
            zstd -d "$f" --stdout | docker load
          done
          rm -rf /tmp/images
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: hardfork-e2e
          node-image: ${{ needs.run.outputs.node_image }}
          upgrader-image: ${{ needs.hardfork.outputs.upgrader_image }}
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  ledger-rollback-e2e:
    name: Ledger Rollback E2E
    needs: run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      # TODO UNSHIELDED: Hard-fork capability broken after latest `ledger-5.0.0` release
      # - name: Download node image
      #   uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
      #   with:
      #     name: docker-image-node
      #     path: /tmp/images
      # - name: Download upgrader image
      #   uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
      #   with:
      #     name: docker-image-upgrader
      #     path: /tmp/images
      # - name: Load Docker images
      #   run: |
      #     for f in /tmp/images/*.tar.zst; do
      #       zstd -d "$f" --stdout | docker load
      #     done
      #     rm -rf /tmp/images
      # - uses: ./.github/actions/reusable-e2e-tests
      #   with:
      #     just-command: ledger-rollback-e2e
      #     node-image: ${{ needs.run.outputs.node_image }}
      #     upgrader-image: ${{ needs.hardfork.outputs.upgrader_image }}
      #     ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
      - name: 💤 Dummy step to bypass real test
        run: echo "Skipping test — dummy command"

  node-e2e:
    name: Node E2E
    needs: run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      # - name: Download node image
      #   uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
      #   with:
      #     name: docker-image-node
      #     path: /tmp/images
      # - name: Download toolkit image
      #   uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
      #   with:
      #     name: docker-image-toolkit
      #     path: /tmp/images
      # - name: Load Docker images
      #   run: |
      #     for f in /tmp/images/*.tar.zst; do
      #       zstd -d "$f" --stdout | docker load
      #     done
      #     rm -rf /tmp/images
      # - uses: ./.github/actions/reusable-e2e-tests
      #   with:
      #     just-command: node-e2e
      #     node-image: ${{ needs.run.outputs.node_image }}
      #     toolkit-image: ${{ needs.run.outputs.toolkit_image }}
      #     ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
      - name: 💤 Dummy step to bypass real test
        run: echo "Skipping test — dummy command"

  # Test pallet-midnight fixture tests - these do NOT require toolkit-js
  test-pallet-fixtures:
    name: Test Pallet Fixtures
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Free disk space
        run: scripts/free-disk-space.sh

      - name: Run pallet fixture tests
        run: |
          . ./.envrc && earthly --strict +test-pallet-fixtures

  # Gate job for toolkit E2E tests - if this fails, toolkit E2E tests are skipped
  test-toolkit:
    name: Test Toolkit
    runs-on: ubuntu-latest-16-core-x64
    env:
      FORCE_COLOR: 1
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false

      - name: Checkout node repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Free disk space
        run: scripts/free-disk-space.sh

      - name: Run toolkit tests
        run: |
          . ./.envrc && earthly -P --secret GITHUB_TOKEN="${{ secrets.MIDNIGHTCI_PACKAGES_READ }}" --strict +test-toolkit

  toolkit-e2e:
    name: Toolkit E2E
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Download node image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-node
          path: /tmp/images
      - name: Download toolkit image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-toolkit
          path: /tmp/images
      - name: Load Docker images
        run: |
          for f in /tmp/images/*.tar.zst; do
            zstd -d "$f" --stdout | docker load
          done
          rm -rf /tmp/images
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: toolkit-e2e
          node-image: ${{ needs.run.outputs.node_image }}
          toolkit-image: ${{ needs.run.outputs.toolkit_image }}
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  toolkit-update-ledger-parameters-e2e:
    name: Toolkit Update Ledger Parameters E2E
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Download node image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-node
          path: /tmp/images
      - name: Download toolkit image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-toolkit
          path: /tmp/images
      - name: Load Docker images
        run: |
          for f in /tmp/images/*.tar.zst; do
            zstd -d "$f" --stdout | docker load
          done
          rm -rf /tmp/images
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: toolkit-update-ledger-parameters-e2e
          node-image: ${{ needs.run.outputs.node_image }}
          toolkit-image: ${{ needs.run.outputs.toolkit_image }}
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  toolkit-maintenance-e2e:
    name: Toolkit Maintenance E2E
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Download node image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-node
          path: /tmp/images
      - name: Download toolkit image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-toolkit
          path: /tmp/images
      - name: Load Docker images
        run: |
          for f in /tmp/images/*.tar.zst; do
            zstd -d "$f" --stdout | docker load
          done
          rm -rf /tmp/images
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: toolkit-maintenance-e2e
          node-image: ${{ needs.run.outputs.node_image }}
          toolkit-image: ${{ needs.run.outputs.toolkit_image }}
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  toolkit-mint-e2e:
    name: Toolkit Mint E2E
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Download node image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-node
          path: /tmp/images
      - name: Download toolkit image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-toolkit
          path: /tmp/images
      - name: Load Docker images
        run: |
          for f in /tmp/images/*.tar.zst; do
            zstd -d "$f" --stdout | docker load
          done
          rm -rf /tmp/images
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: toolkit-mint-e2e
          node-image: ${{ needs.run.outputs.node_image }}
          toolkit-image: ${{ needs.run.outputs.toolkit_image }}
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  toolkit-ut-e2e:
    name: Toolkit Unshielded Token E2E
    needs: [run]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: Download node image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-node
          path: /tmp/images
      - name: Download toolkit image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-toolkit
          path: /tmp/images
      - name: Load Docker images
        run: |
          for f in /tmp/images/*.tar.zst; do
            zstd -d "$f" --stdout | docker load
          done
          rm -rf /tmp/images
      - uses: ./.github/actions/reusable-e2e-tests
        with:
          just-command: toolkit-ut-e2e
          node-image: ${{ needs.run.outputs.node_image }}
          toolkit-image: ${{ needs.run.outputs.toolkit_image }}
          ghcr-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  metadata-check:
    name: Metadata Check
    needs: run
    runs-on: ubuntu-latest
    steps:
      - uses: EarthBuild/actions-setup@cae2d9ab68894d8402751fe42e07c7cca0272f7f
        with:
          version: v0.8.16
          github-token: ${{ github.token }}
          use-cache: false
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Download node image
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v4
        with:
          name: docker-image-node
          path: /tmp/images

      - name: Start local registry and load images
        run: |
          mkdir -p ~/.earthly
          cat > ~/.earthly/config.yml <<'EOFCFG'
          global:
            buildkit_additional_args: ["--network", "host"]
            buildkit_additional_config: |
              [registry."127.0.0.1:5000"]
                http = true
                insecure = true
          EOFCFG

          docker run -d --network host --name registry registry:2

          for f in /tmp/images/*.tar.zst; do
            zstd -d "$f" --stdout | docker load
          done

          NODE_TAG="${{ needs.run.outputs.version }}-${{ needs.run.outputs.short_hash }}-amd64"
          docker tag "ghcr.io/midnight-ntwrk/midnight-node:${NODE_TAG}" "127.0.0.1:5000/midnight-ntwrk/midnight-node:${NODE_TAG}"
          docker push "127.0.0.1:5000/midnight-ntwrk/midnight-node:${NODE_TAG}"
          rm -rf /tmp/images

      - name: Run metadata check
        run: |
          NODE_TAG="${{ needs.run.outputs.version }}-${{ needs.run.outputs.short_hash }}-amd64"
          . ./.envrc && earthly --strict -P --build-arg NODE_IMAGE=127.0.0.1:5000/midnight-ntwrk/midnight-node:${NODE_TAG} +check-metadata

