name: Tree Cache Guard Save
description: Save a cache entry marking this job as passed for the given key

inputs:
  key:
    description: Cache key from tree-cache-guard check step
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      run: mkdir -p /tmp/ci-sentinel && touch /tmp/ci-sentinel/ok

    - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        key: ${{ inputs.key }}
        path: /tmp/ci-sentinel
