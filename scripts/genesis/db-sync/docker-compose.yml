services:
  postgres:
    image: postgres:16
    container_name: db-sync-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cexplorer
    shm_size: 1g
    command: postgres -c max_wal_size=4GB -c checkpoint_timeout=30min -c shared_buffers=512MB -c work_mem=256MB -c maintenance_work_mem=1GB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
