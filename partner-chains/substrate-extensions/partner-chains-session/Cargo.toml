[package]
name = "pallet-partner-chains-session"
version = "1.8.1"
description = "FRAME pallet for setting validators with InherentData and session management"
license = "Apache-2.0"
authors = ["IOG"]
homepage = "https://iohk.io/"
edition = "2024"
repository = "https://github.com/input-output-hk/partner-chains.git"

[package.metadata.cargo-shear]
ignored = ["parity-scale-codec", "scale-info"]

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lints]
workspace = true

[dependencies]
parity-scale-codec = { version = "3.7.5", default-features = false, features = ["derive", "max-encoded-len"] }
frame-support = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
frame-system = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
impl-trait-for-tuples = "0.2.2"
log = { version = "0.4.29", default-features = false }
scale-info = { version = "2.11.1", default-features = false, features = ["derive", "serde"] }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["serde"] }
sp-staking = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["serde"] }
sp-std = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
pallet-session = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, optional = true }

[features]
default = ["std", "polkadot-js-compat"]
std = [
	"parity-scale-codec/std",
	"frame-support/std",
	"frame-system/std",
	"log/std",
	"scale-info/std",
	"sp-runtime/std",
	"sp-staking/std",
	"sp-std/std",
	"pallet-session?/std"
]
polkadot-js-compat = []
pallet-session-compat = ["pallet-session"]

[lib]
test = false
doctest = false
