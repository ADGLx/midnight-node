[package]
name = "sp-partner-chains-consensus-aura"
version = "1.8.1"
description = "Primitives required by Partner Chains customized Aura consensus"
authors = ["IOG"]
homepage = "https://iohk.io/"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/input-output-hk/partner-chains.git"
readme = "README.md"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lints]
workspace = true

[dependencies]
futures = { version = "0.3.32", default-features = false, features = ["thread-pool"] }
sp-consensus = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-consensus-slots = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, optional = true }
sp-inherents = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, optional = true }

[dev-dependencies]
sp-blockchain = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }

[features]
default = ["std"]
std = [
	"sp-consensus-slots/std",
	"sp-runtime/std",
	"sp-inherents/std",
]

[lib]
doctest = false
