[package]
name = "partner-chains-demo-node"
version = "1.8.1"
description = "A reference implementation of a partner chain node"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"
license = "Unlicense"
publish = false
build = "build.rs"

[package.metadata.cargo-shear]
ignored = ["sc-client-db"]

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bin]]
name = "partner-chains-demo-node"

[lints]
workspace = true

[dependencies]
clap = { version = "4.5", features = ["env", "derive"] }
log = { version = "0.4.29", default-features = false }
sc-cli = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["rocksdb"] }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-executor = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-network = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-service = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-telemetry = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-transaction-pool = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-transaction-pool-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-consensus-aura = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-partner-chains-consensus-aura = { path = "../../substrate-extensions/aura/consensus", default-features = false }
sp-consensus-aura = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-partner-chains-consensus-aura = { path = "../../substrate-extensions/aura/primitives", default-features = false }
sc-consensus = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-consensus-grandpa = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-consensus-grandpa-rpc = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-client-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
# This node template uses RocksDB as the storage backend by default.
sc-client-db = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["rocksdb"] }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-io = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-timestamp = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-inherents = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
authority-selection-inherents = { path = "../../toolkit/committee-selection/authority-selection-inherents", default-features = false }
sp-block-production-log = { path = "../../toolkit/block-production-log/primitives", default-features = false }
sidechain-domain = { path = "../../toolkit/sidechain/domain", default-features = false }
sidechain-slots = { path = "../../toolkit/sidechain/sidechain-slots", default-features = false }
sp-sidechain = { path = "../../toolkit/sidechain/primitives", default-features = false }
pallet-sidechain-rpc = { path = "../../toolkit/sidechain/rpc", default-features = false }
sp-session-validator-management = { path = "../../toolkit/committee-selection/primitives", default-features = false }
sp-session-validator-management-query = { path = "../../toolkit/committee-selection/query", default-features = false }
pallet-session-validator-management-rpc = { path = "../../toolkit/committee-selection/rpc", default-features = false }
serde_json = { version = "1.0.149", default-features = false, features = ["alloc"] }
time-source = { path = "../../toolkit/utils/time-source", default-features = false }
derive-new = { version = "0.7.0", default-features = false }
partner-chains-cli = { path = "../../toolkit/partner-chains-cli", default-features = false }
partner-chains-node-commands = { path = "../../toolkit/cli/node-commands", default-features = false }
envy = { version = "0.4.2" }
sp-partner-chains-bridge = { path = "../../toolkit/bridge/primitives", default-features = false }

# These dependencies are used for the node template's RPCs
jsonrpsee = { version = "0.24.10", features = ["client-core", "server", "macros"] }
sc-rpc = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-blockchain = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-block-builder = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-basic-authorship = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
substrate-frame-rpc-system = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
pallet-block-producer-fees-rpc = { path = "../../toolkit/block-producer-fees/rpc", default-features = false }
sp-block-producer-fees = { path = "../../toolkit/block-producer-fees/primitives", default-features = false }
pallet-transaction-payment-rpc = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }

# Local Dependencies
partner-chains-demo-runtime = { path = "../runtime" }
sidechain-mc-hash = { path = "../../toolkit/sidechain/sidechain-mc-hash", default-features = false, features = ["mock"] }
partner-chains-db-sync-data-sources = { path = "../../toolkit/data-sources/db-sync", default-features = false, features = ["block-source", "candidate-source", "governed-map", "mc-hash", "sidechain-rpc", "block-participation", "bridge"] }
partner-chains-mock-data-sources = { path = "../../toolkit/data-sources/mock", default-features = false, features = ["block-source", "candidate-source", "governed-map", "mc-hash", "sidechain-rpc", "block-participation", "bridge"] }
tokio = { version = "1.50", features = ["net", "rt-multi-thread", "macros", "time", "sync", "fs", "io-util"] }
sp-block-participation = { path = "../../toolkit/block-participation/primitives", default-features = false, features = ["std"] }
sp-block-producer-metadata = { path = "../../toolkit/block-producer-metadata/primitives", default-features = false, features = ["std"] }
pallet-block-producer-metadata-rpc = { path = "../../toolkit/block-producer-metadata/rpc", default-features = false }
sp-governed-map = { path = "../../toolkit/governed-map/primitives", default-features = false, features = ["std"] }

[build-dependencies]
substrate-build-script-utils = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }

[dev-dependencies]
hex-literal = { version = "1.1.0", default-features = false }
time-source = { path = "../../toolkit/utils/time-source", default-features = false, features = ["mock"] }
assert_cmd = { version = "2.2.0" }
pallet-sidechain-rpc = { path = "../../toolkit/sidechain/rpc", default-features = false }
authority-selection-inherents = { path = "../../toolkit/committee-selection/authority-selection-inherents", default-features = false, features = ["mock"] }

[features]
default = ["sidechain-domain/std"]

[lib]
doctest = false
