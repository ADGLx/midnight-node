[package]
name = "partner-chains-demo-runtime"
version = "1.8.1"
description = "A reference implementation of a partner chain runtime"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"
license = "Unlicense"
publish = false

[package.metadata.cargo-shear]
ignored = ["pallet-session"]

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lints]
workspace = true

[dependencies]
log = { version = "0.4.29", default-features = false }
parity-scale-codec = { version = "3.7.5", default-features = false, features = ["derive", "max-encoded-len"] }
scale-info = { version = "2.11.1", default-features = false, features = ["derive"] }
serde = { version = "1.0.228", default-features = false, features = ["derive", "alloc"] }
serde_json = { version = "1.0.149", default-features = false, features = ["alloc"] }

pallet-aura = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
pallet-balances = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
frame-support = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
pallet-grandpa = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
pallet-partner-chains-session = { path = "../../substrate-extensions/partner-chains-session", default-features = false, features = ["pallet-session-compat"] }
pallet-session = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
pallet-sudo = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
frame-system = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
frame-try-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, optional = true }
hex = { version = "0.4.3", default-features = false, features = ["alloc"] }
pallet-timestamp = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
pallet-transaction-payment = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
frame-executive = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-block-builder = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-consensus-aura = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-consensus-grandpa = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-consensus-slots = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-genesis-builder = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-inherents = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-keyring = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-offchain = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-session = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-std = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-transaction-pool = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-version = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-storage = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-weights = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
authority-selection-inherents = { path = "../../toolkit/committee-selection/authority-selection-inherents", default-features = false }

hex-literal = { version = "1.1.0", default-features = false }

# Used for the node template's RPCs
frame-system-rpc-runtime-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
pallet-transaction-payment-rpc-runtime-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }

# Used for runtime benchmarking
frame-benchmarking = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, optional = true }
frame-system-benchmarking = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, optional = true }

# Local Dependencies
sp-block-production-log = { path = "../../toolkit/block-production-log/primitives", default-features = false }
pallet-block-production-log = { path = "../../toolkit/block-production-log/pallet", default-features = false }
sp-sidechain = { path = "../../toolkit/sidechain/primitives", default-features = false }
pallet-sidechain = { path = "../../toolkit/sidechain/pallet", default-features = false }
pallet-session-validator-management = { path = "../../toolkit/committee-selection/pallet", default-features = false, features = ["pallet-session-compat"] }
sp-session-validator-management = { path = "../../toolkit/committee-selection/primitives", default-features = false, features = ["serde"] }
sidechain-domain = { path = "../../toolkit/sidechain/domain", default-features = false, features = ["serde"] }
sidechain-slots = { path = "../../toolkit/sidechain/sidechain-slots", default-features = false }
pallet-address-associations = { path = "../../toolkit/address-associations/pallet", default-features = false }
pallet-block-producer-metadata = { path = "../../toolkit/block-producer-metadata/pallet", default-features = false }
sp-block-producer-metadata = { path = "../../toolkit/block-producer-metadata/primitives", default-features = false }
pallet-block-participation = { path = "../../toolkit/block-participation/pallet", default-features = false }
sp-block-participation = { path = "../../toolkit/block-participation/primitives", default-features = false }
pallet-governed-map = { path = "../../toolkit/governed-map/pallet", default-features = false }
sp-governed-map = { path = "../../toolkit/governed-map/primitives", default-features = false }
sp-block-producer-fees = { path = "../../toolkit/block-producer-fees/primitives", default-features = false }
pallet-block-producer-fees = { path = "../../toolkit/block-producer-fees/pallet", default-features = false }
pallet-partner-chains-bridge = { path = "../../toolkit/bridge/pallet", default-features = false }
sp-partner-chains-bridge = { path = "../../toolkit/bridge/primitives", default-features = false }

[dev-dependencies]
sp-io = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-keyring = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
# we actually don't need it, cause in dev we can use full sp-keyring, but its usage gives a good example of how to create accountIds in WASM
hex = { version = "0.4.3", default-features = false, features = ["alloc"] }
sp-consensus-slots = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
minicbor = { version = "2.2.1", features = ["alloc"] }
plutus = { path = "../../toolkit/utils/plutus", default-features = false }
serde_json = { version = "1.0.149", default-features = false, features = ["alloc"] }

[build-dependencies]
substrate-wasm-builder = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, optional = true }

[features]
default = ["std"]
std = [
	"authority-selection-inherents/std",
	"serde_json/std",
	"frame-try-runtime?/std",
	"frame-system-benchmarking?/std",
	"frame-system-rpc-runtime-api/std",
	"frame-benchmarking?/std",
	"parity-scale-codec/std",
	"scale-info/std",
	"frame-executive/std",
	"frame-support/std",
	"frame-system-rpc-runtime-api/std",
	"frame-system/std",
	"frame-executive/std",
	"frame-try-runtime/std",
	"pallet-aura/std",
	"pallet-balances/std",
	"pallet-block-producer-fees/std",
	"pallet-block-production-log/std",
	"pallet-grandpa/std",
	"pallet-sudo/std",
	"pallet-partner-chains-session/std",
	"pallet-session-validator-management/std",
	"pallet-timestamp/std",
	"pallet-transaction-payment-rpc-runtime-api/std",
	"pallet-transaction-payment/std",
	"pallet-address-associations/std",
	"pallet-block-producer-metadata/std",
	"sp-block-producer-metadata/std",
	"sp-api/std",
	"sp-block-builder/std",
	"sp-block-producer-fees/std",
	"sp-consensus-aura/std",
	"sp-consensus-grandpa/std",
	"sp-consensus-slots/std",
	"sp-core/std",
	"sp-genesis-builder/std",
	"sp-keyring/std",
	"sp-inherents/std",
	"sp-offchain/std",
	"sp-runtime/std",
	"sp-session/std",
	"sp-std/std",
	"sp-transaction-pool/std",
	"sp-version/std",
	"sp-storage/std",
	"sp-io/std",
	"sp-weights/std",
	"substrate-wasm-builder",
	"pallet-sidechain/std",
	"sidechain-slots/std",
	"sidechain-domain/std",
	"sp-inherents/std",
	"sp-block-production-log/std",
	"pallet-block-participation/std",
	"sp-block-participation/std",
	"pallet-governed-map/std",
	"sp-governed-map/std",
	"pallet-partner-chains-bridge/std",
	"sp-partner-chains-bridge/std",
]

runtime-benchmarks = [
	"frame-benchmarking/runtime-benchmarks",
	"frame-support/runtime-benchmarks",
	"frame-system-benchmarking/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"pallet-balances/runtime-benchmarks",
	"pallet-grandpa/runtime-benchmarks",
	"pallet-sudo/runtime-benchmarks",
	"pallet-timestamp/runtime-benchmarks",
	"sp-runtime/runtime-benchmarks",
	"pallet-block-production-log/runtime-benchmarks",
	"pallet-address-associations/runtime-benchmarks",
	"pallet-block-producer-fees/runtime-benchmarks",
	"pallet-block-producer-metadata/runtime-benchmarks",
	"pallet-block-participation/runtime-benchmarks",
	"pallet-governed-map/runtime-benchmarks",
	"pallet-partner-chains-bridge/runtime-benchmarks",
	"pallet-session-validator-management/runtime-benchmarks",
]
try-runtime = [
	"frame-try-runtime/try-runtime",
	"frame-executive/try-runtime",
	"frame-system/try-runtime",
	"frame-support/try-runtime",
	"pallet-aura/try-runtime",
	"pallet-balances/try-runtime",
	"pallet-grandpa/try-runtime",
	"pallet-sudo/try-runtime",
	"pallet-timestamp/try-runtime",
	"pallet-transaction-payment/try-runtime",
]

[lib]
doctest = false
