[package]
name = "sidechain-slots"
version = "1.8.1"
license = "Apache-2.0"
description = "Sidechain slots and epoch calcuations"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"
readme = "README.md"

[lints]
workspace = true

[dependencies]
parity-scale-codec = { version = "3.7.5", default-features = false, features = ["derive", "max-encoded-len"] }
scale-info = { version = "2.11.1", default-features = false, features = ["derive"] }
sidechain-domain = { path = "../domain", default-features = false }
sp-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-blockchain = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, optional = true }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["serde"] }
sp-consensus-slots = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
serde = { version = "1.0.228", default-features = false, optional = true, features = ["derive", "alloc"] }
envy = { version = "0.4.2", optional = true }

[dev-dependencies]
proptest = { version = "1.11.0" }

[features]
default = ['std']
std = [
    'sidechain-domain/std',
    'scale-info/std',
    'sp-api/std',
	'sp-blockchain',
    'sp-core/std',
    'sp-consensus-slots/std',
    'envy',
]
serde = [
    "dep:serde",
    "scale-info/serde",
    "sp-core/serde",
]

[lib]
doctest = false
