[package]
name = "partner-chains-node-commands"
version = "1.8.1"
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"

[package.metadata.cargo-shear]
ignored = ["plutus"]

[lints]
workspace = true

[dependencies]
authority-selection-inherents = { path = "../../committee-selection/authority-selection-inherents", default-features = false }
clap = { version = "4.5", features = ["env", "derive"] }
cli-commands = { path = "../commands" }
frame-support = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
log = { version = "0.4.29", default-features = false }
log4rs = { version = "1.4.0", default-features = false, features = ["console_appender", "file_appender"] }
parity-scale-codec = { version = "3.7.5", default-features = false, features = ["derive", "max-encoded-len"] }
partner-chains-cli = { path = "../../partner-chains-cli", default-features = false }
partner-chains-smart-contracts-commands = { path = "../../smart-contracts/commands", default-features = false }
plutus = { path = "../../utils/plutus", default-features = false }
sidechain-domain = { path = "../../sidechain/domain", default-features = false, features = ["std"] }
sc-cli = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sc-service = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["std"] }
#sp-core = { workspace = true, features = ["std"] }
sp-blockchain = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["std"] }
sp-sidechain = { path = "../../sidechain/primitives", default-features = false, features = ["std"] }
sp-session-validator-management = { path = "../../committee-selection/primitives", default-features = false }
sp-session-validator-management-query = { path = "../../committee-selection/query", default-features = false }
once_cell = { version = "1.21.4", default-features = false }

[dev-dependencies]
tokio = { version = "1.50", features = ["net", "rt-multi-thread", "macros", "time", "sync", "fs", "io-util"] }

[lib]
doctest = false
