[package]
name = "cli-commands"
version = "1.8.1"
license = "Apache-2.0"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lints]
workspace = true

[dependencies]
anyhow = { version = "1.0.102" }
clap = { version = "4.5", features = ["env", "derive"] }
ed25519-zebra = { version = "4.2.0" }
hex = { version = "0.4.3", default-features = false, features = ["alloc"] }
hex-literal = { version = "1.1.0", default-features = false }
plutus = { path = "../../utils/plutus", default-features = false }
plutus-datum-derive = { path = "../../utils/plutus/plutus-datum-derive", default-features = false }
secp256k1 = { version = "0.30.0", default-features = false, features = ["std", "global-context"] }
k256 = { version = "0.13.4", default-features = false, features = ["serde"] }
sidechain-domain = { path = "../../sidechain/domain", default-features = false, features = ["std"] }
sp-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["std"] }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["std"] }
sp-sidechain = { path = "../../sidechain/primitives", default-features = false, features = ["std"] }
sp-blockchain = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
thiserror = { version = "2.0.18", default-features = false }
serde = { version = "1.0.228", default-features = false, features = ["derive", "alloc"] }
serde_json = { version = "1.0.149", default-features = false, features = ["alloc"] }
pallet-address-associations = { path = "../../address-associations/pallet", default-features = false, features = ["std"] }
parity-scale-codec = { version = "3.7.5", default-features = false, features = ["derive", "max-encoded-len"] }
sp-block-producer-metadata = { path = "../../block-producer-metadata/primitives", default-features = false, features = ["std"] }
time-source = { path = "../../utils/time-source", default-features = false }

[dev-dependencies]
pretty_assertions = { version = "1.4.1" }
time-source = { path = "../../utils/time-source", default-features = false, features = ["mock"] }

[lib]
doctest = false
