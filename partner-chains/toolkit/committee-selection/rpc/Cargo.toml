[package]
name = "pallet-session-validator-management-rpc"
version = "1.8.1"
license = "Apache-2.0"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"

[lints]
workspace = true

[dependencies]
derive-new = { version = "0.7.0", default-features = false }
jsonrpsee = { version = "0.24.10", features = ["client-core", "server", "macros"] }
sidechain-domain = { path = "../../sidechain/domain", default-features = false, features = ["std"] }
sp-session-validator-management-query = { path = "../query", default-features = false }

[lib]
test = false
doctest = false
