[package]
name = "selection"
version = "1.8.1"
description = "Selection logic for sidechain validators"
publish = false
license = "Apache-2.0"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"
readme = "README.md"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lints]
workspace = true

[dependencies]
rand_chacha = { version = "0.10.0", default-features = false }
rand = { version = "0.10.0", default-features = false }

[dev-dependencies]
quickcheck = { version = "1.1.0" }
quickcheck_macros = { version = "1" }

[features]
default = ["std"]
std = [
    "rand/std"
]

[lib]
doctest = false
