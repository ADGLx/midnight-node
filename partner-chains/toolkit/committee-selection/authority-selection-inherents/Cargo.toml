[package]
name = "authority-selection-inherents"
version = "1.8.1"
license = "Apache-2.0"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lints]
workspace = true

[dependencies]
async-trait = { version = "0.1.89", default-features = false, optional = true }
frame-support = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
log = { version = "0.4.29", default-features = false }
minicbor = { version = "2.2.1", features = ["alloc"] }
sp-session-validator-management = { path = "../primitives", default-features = false }
parity-scale-codec = { version = "3.7.5", default-features = false, features = ["derive", "max-encoded-len"] }
plutus = { path = "../../utils/plutus", default-features = false }
plutus-datum-derive = { path = "../../utils/plutus/plutus-datum-derive", default-features = false }
scale-info = { version = "2.11.1", default-features = false, features = ["derive"] }
selection = { path = "../selection", default-features = false }
sidechain-domain = { path = "../../sidechain/domain", default-features = false }
sidechain-slots = { path = "../../sidechain/sidechain-slots", default-features = false, optional = true }
sp-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-inherents = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
thiserror = { version = "2.0.18", default-features = false, optional = true }
serde = { version = "1.0.228", default-features = false, features = ["derive", "alloc"] }
sp-consensus-slots = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }

[dev-dependencies]
hex = { version = "0.4.3", default-features = false, features = ["alloc"] }
hex-literal = { version = "1.1.0", default-features = false }
num-bigint = { version = "0.4.3", default-features = false }
tokio = { version = "1.50", features = ["net", "rt-multi-thread", "macros", "time", "sync", "fs", "io-util"] }

[features]
default = ["std"]
std = [
	"frame-support/std",
	"sidechain-domain/std",
	"parity-scale-codec/std",
	"serde/std",
	"sidechain-slots",
	"sidechain-slots/std",
	"sidechain-slots/serde",
	"sp-api/std",
	"sp-session-validator-management/std",
	"sp-session-validator-management/serde",
	"sp-core/std",
	"sp-inherents/std",
	"sp-runtime/std",
	"thiserror",
	"async-trait",
]
mock = []

[lib]
doctest = false
