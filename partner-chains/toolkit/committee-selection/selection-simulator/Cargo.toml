[package]
name = "ariadne-simulator"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"
version = "1.8.1"
license = "Apache-2.0"
description = "Executable tool for simulating committee selection using the Ariadne algorithm"

[dependencies]
selection = { path = "../selection", default-features = true }
serde = { version = "1.0.228", default-features = false, features = ["derive", "alloc"] }
serde_json = { version = "1.0.149", default-features = false, features = ["alloc", "std"] }
clap = { version = "4.5", features = ["env", "derive"] }
rand_chacha = { version = "0.10.0", default-features = false }
rand = { version = "0.10.0", default-features = false, features = ["sys_rng"] }
log = { version = "0.4.29", default-features = false }
env_logger = { version = "0.11.8" }
itertools = { version = "0.14.0", default-features = false, features = ["use_alloc"] }

[lints]
workspace = true
