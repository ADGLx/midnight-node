[package]
name = "pallet-block-producer-fees-rpc"
version = "1.8.1"
license = "Apache-2.0"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"

[lints]
workspace = true

[dependencies]
parity-scale-codec = { version = "3.7.5", default-features = false, features = ["derive", "max-encoded-len"] }
jsonrpsee = { version = "0.24.10", features = ["client-core", "server", "macros"] }
serde = { version = "1.0.228", default-features = false, features = ["derive", "alloc"] }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = [] }
sp-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = [] }
sp-block-producer-fees = { path = "../primitives", default-features = false, features = [] }
sp-blockchain = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
derive-new = { version = "0.7.0", default-features = false }

[features]
default = []

[lib]
test = false
