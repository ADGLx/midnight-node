[package]
name = "sp-block-producer-fees"
version = "1.8.1"
license = "Apache-2.0"
description = "Primitives for the block producer fees"
readme = "README.md"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"

[lints]
workspace = true

[dependencies]
parity-scale-codec = { version = "3.7.5", default-features = false, features = ["derive", "max-encoded-len"] }
sp-api = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-std = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }

[features]
default = ["std"]
std = ["parity-scale-codec/std", "sp-api/std", "sp-std/std"]

[lib]
test = false
doctest = false
