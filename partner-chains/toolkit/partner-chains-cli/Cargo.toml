[package]
name = "partner-chains-cli"
version = "1.8.1"
license = "Apache-2.0"
description = "Wizard style CLI for getting started as partner chains participant"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"
readme = "README.md"

[package.metadata.cargo-shear]
ignored = ["plutus", "scale-info"]

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lints]
workspace = true

[dependencies]
sidechain-domain = { path = "../sidechain/domain", default-features = false, features = ["std"] }
anyhow = { version = "1.0.102" }
clap = { version = "4.5", features = ["env", "derive"] }
hex = { version = "0.4.3", default-features = false, features = ["alloc"] }
inquire = { version = "0.9.4" }
libp2p-identity = { version = "0.2.13", features = ["peerid", "ed25519"] }
serde = { version = "1.0.228", default-features = false, features = ["derive", "alloc"] }
serde_json = { version = "1.0.149", default-features = false, features = ["alloc", "std"] }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["std"] }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["std"] }
tempfile = { version = "3.27.0" }
secp256k1 = { version = "0.30.0", default-features = false, features = ["std"] }
colored = { version = "3.1.1" }
ogmios-client = { path = "../utils/ogmios-client", default-features = false, features = ["jsonrpsee-client"] }
tokio = { version = "1.50", features = ["net", "rt-multi-thread", "macros", "time", "sync", "fs", "io-util"] }
partner-chains-cardano-offchain = { path = "../smart-contracts/offchain", default-features = false }
plutus = { path = "../utils/plutus", default-features = false }
plutus-datum-derive = { path = "../utils/plutus/plutus-datum-derive", default-features = false }
ed25519-zebra = { version = "4.2.0" }
sp-session-validator-management = { path = "../committee-selection/primitives", default-features = false, features = ["std"] }
pallet-session-validator-management = { path = "../committee-selection/pallet", default-features = false, features = ["std"] }
pallet-partner-chains-bridge = { path = "../bridge/pallet", default-features = false, features = ["std"] }
sp-partner-chains-bridge = { path = "../bridge/primitives", default-features = false, features = ["std"] }
pallet-partner-chains-session = { path = "../../substrate-extensions/partner-chains-session", default-features = false, features = ["pallet-session-compat", "std"] }
pallet-sidechain = { path = "../sidechain/pallet", default-features = false, features = ["std"] }
pallet-governed-map = { path = "../governed-map/pallet", default-features = false, features = ["std"] }
sp-governed-map = { path = "../governed-map/primitives", default-features = false, features = ["std"] }
sidechain-slots = { path = "../sidechain/sidechain-slots", default-features = false }
authority-selection-inherents = { path = "../committee-selection/authority-selection-inherents", default-features = false, features = ["std"] }

[dev-dependencies]
frame-system = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
frame-support = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
hex-literal = { version = "1.1.0", default-features = false }
pallet-balances = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
parity-scale-codec = { version = "3.7.5", default-features = false, features = ["derive", "max-encoded-len"] }
pretty_assertions = { version = "1.4.1" }
scale-info = { version = "2.11.1", default-features = false, features = ["derive"] }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false }

[features]
default = ["std"]
std = []
runtime-benchmarks = []

[lib]
doctest = false
