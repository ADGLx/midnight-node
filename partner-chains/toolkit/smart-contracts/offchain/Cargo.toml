[package]
name = "partner-chains-cardano-offchain"
version = "1.8.1"
license = "Apache-2.0"
description = "Partner Chains Smart Contracts Offchain code"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lints]
workspace = true

[dependencies]
anyhow = { version = "1.0.102" }
cardano-serialization-lib = { version = "15.0.3", default-features = false }
cbor_event = { version = "2.4.0" }
partner-chains-plutus-data = { path = "../plutus-data", default-features = false }
fraction = { version = "0.15.3", default-features = false }
hex = { version = "0.4.3", default-features = false, features = ["alloc"] }
hex-literal = { version = "1.1.0", default-features = false }
log = { version = "0.4.29", default-features = false }
minicbor = { version = "2.2.1", features = ["alloc"] }
ogmios-client = { path = "../../utils/ogmios-client", default-features = false, features = ["jsonrpsee-client"] }
#pallas-primitives = { workspace = true }
plutus = { path = "../../utils/plutus", default-features = false }
raw-scripts = { git = "https://github.com/input-output-hk/partner-chains-smart-contracts.git", tag = "v8.1.0" }
serde = { version = "1.0.228", default-features = false, features = ["derive", "alloc"] }
serde_json = { version = "1.0.149", default-features = false, features = ["alloc", "std"] }
sidechain-domain = { path = "../../sidechain/domain", default-features = false, features = ["std"] }
uplc = { version = "1.1.21" }
tokio = { version = "1.50", features = ["net", "rt-multi-thread", "macros", "time", "sync", "fs", "io-util"] }
tokio-retry = { version = "0.3" }

[dev-dependencies]
proptest = { version = "1.11.0" }
pretty_assertions = { version = "1.4.1" }
testcontainers = { version = "0.27", features = ["blocking"] }
itertools = { version = "0.14.0", default-features = false, features = ["use_alloc"] }

[lib]
doctest = false
