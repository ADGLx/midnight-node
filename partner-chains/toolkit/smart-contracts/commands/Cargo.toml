[package]
name = "partner-chains-smart-contracts-commands"
version = "1.8.1"
license = "Apache-2.0"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"

[lints]
workspace = true

[dependencies]
clap = { version = "4.5", features = ["env", "derive"] }
sidechain-domain = { path = "../../sidechain/domain", default-features = false }
partner-chains-cardano-offchain = { path = "../offchain", default-features = false }
hex = { version = "0.4.3", default-features = false, features = ["alloc"] }
ogmios-client = { path = "../../utils/ogmios-client", default-features = false }
tokio = { version = "1.50", features = ["net", "rt-multi-thread", "macros", "time", "sync", "fs", "io-util"] }
serde = { version = "1.0.228", default-features = false, features = ["derive", "alloc"] }
serde_json = { version = "1.0.149", default-features = false, features = ["alloc"] }
anyhow = { version = "1.0.102" }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["std"] }

[dev-dependencies]
hex-literal = { version = "1.1.0", default-features = false }

[lib]
doctest = false
