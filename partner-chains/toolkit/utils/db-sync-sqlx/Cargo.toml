[package]
name = "db-sync-sqlx"
version = "1.8.1"
description = "sqlx support for Cardano Db-Sync queries"
license = "Apache-2.0"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"

[lints]
workspace = true

[dependencies]
sqlx = { version = "0.8.6", default-features = false, features = ["runtime-tokio-rustls", "postgres", "macros", "chrono", "migrate", "bigdecimal"] }
sidechain-domain = { path = "../../sidechain/domain", default-features = false, features = ["std"] }
num-traits = { version = "0.2.17", default-features = false }
hex = { version = "0.4.3", default-features = false, features = ["alloc"] }

[lib]
test = false
doctest = false
