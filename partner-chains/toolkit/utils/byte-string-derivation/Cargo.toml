[package]
name = "byte-string-derive"
version = "1.8.1"
license = "Apache-2.0"
authors = ["IOG"]
edition = "2024"
homepage = "https://iohk.io/"
repository = "https://github.com/input-output-hk/partner-chains.git"
description = "Proc macros for generating conversions for byte string wrapper types"

[lib]
proc-macro = true
test = false

[lints]
workspace = true

[dependencies]
syn = { version = "2", features = ["full", "extra-traits"] }
quote = { version = "1.0" }

[dev-dependencies]
sp-core = { git = "https://github.com/paritytech/polkadot-sdk.git", tag = "polkadot-stable2603", default-features = false, features = ["std"] }
serde_test = "*"
serde = { version = "1.0.228", default-features = false, features = ["derive", "alloc"] }
