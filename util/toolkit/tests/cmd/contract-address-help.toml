bin.name = "midnight-node-toolkit"
args = ["contract-address", "--help"]
status.code = 0
stderr = ""

stdout = """
Show and save in a file the Contract Address included in a DeployContract tx

Usage: midnight-node-toolkit contract-address [OPTIONS] --src-file <SRC_FILE>

Options:
      --tagged
          Serialize Tagged
  -v, --verbose
          Enable verbose output (sets log level to debug) [env: MN_VERBOSE=]
      --verbose-ledger
          Enable verbose ledger tracing output (sets tracing level to debug) [env: MN_VERBOSE_LEDGER=]
  -s, --src-file <SRC_FILE>
          Serialized Transaction
      --verbose-fetch
          Enable verbose fetch logging (sets midnight_node_toolkit::fetcher to debug) [env: MN_VERBOSE_FETCH=]
  -q, --quiet
          Suppress info-level logs (only show warnings and errors) [env: MN_QUIET=]
      --log-json
          Output logs in JSON format (for machine parsing) [env: MN_LOG_JSON=]
      --replay-concurrency <REPLAY_CONCURRENCY>
          Number of threads for parallel wallet updates during block replay. Defaults to number of CPU cores [env: MN_REPLAY_CONCURRENCY=]
  -h, --help
          Print help
"""
