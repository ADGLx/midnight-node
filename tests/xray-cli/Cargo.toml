[package]
name = "xray-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
xmltree = "0.12.0"
regex = "1.12.2"
clap = { version = "4.5.53", features = ["derive"] }
anyhow = "1.0.100"
reqwest = { version = "0.12.24", features = ["json", "rustls-tls", "multipart"] }
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "fs"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.142"
